<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <style>
        body {
            font-family: Arial;
            background: #e6f7ff;
            text-align: center;
        }
        .result-box {
            margin-top: 100px;
            padding: 30px;
            background: white;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        a {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>
<body>

<div class="result-box">
    <h2>Prediction Result</h2>

    <h3>{{ result }}</h3>

    <a href="/">Try Again</a>
</div>

</body>
</html>
