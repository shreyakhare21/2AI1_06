<!DOCTYPE html><html>
<head>
    <title>Prediction Result</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #89f7fe, #66a6ff);
            text-align: center;
        }
        .result-box {
            margin-top: 120px;
            padding: 30px;
            background: white;
            display: inline-block;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }
        h2 {
            margin-bottom: 20px;
        }
        h3 {
            color: #333;
            font-size: 24px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            border-radius: 5px;
        }
        a:hover {
            background: #0056b3;
        }
    </style>
</head>
<body><div class="result-box">
    <h2> Prediction Result</h2><h3>{{ result }}</h3>

<a href="/">Try Again</a>

</div></body>
</html>
