<!DOCTYPE html>
<html>
<head>
    <title>Titanic Survival Prediction</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }
        .container {
            margin: 50px auto;
            width: 350px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Titanic Survival Prediction</h2>

    <form action="/predict_form" method="post">
        
        <label>Pclass:</label>
        <select name="Pclass">
            <option value="1">1 (Upper)</option>
            <option value="2">2 (Middle)</option>
            <option value="3">3 (Lower)</option>
        </select>

        <label>Sex:</label>
        <select name="Sex">
            <option value="0">Male</option>
            <option value="1">Female</option>
        </select>

        <label>Age:</label>
        <input type="number" step="any" name="Age" required>

        <label>Fare:</label>
        <input type="number" step="any" name="Fare" required>

        <button type="submit">Predict</button>
    </form>
</div>

</body>
</html>
