<!DOCTYPE html><html>
<head>
    <title>Titanic Survival Prediction</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
        }
        .container {
            margin: 80px auto;
            width: 350px;
            padding: 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }
        h2 {
            margin-bottom: 20px;
        }
        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body><div class="container">
    <h2> Titanic Survival Prediction</h2><form action="/predict_form" method="post">
    
    <label>Pclass:</label>
    <select name="pclass">
        <option value="1">1 (Upper)</option>
        <option value="2">2 (Middle)</option>
        <option value="3">3 (Lower)</option>
    </select>

    <label>Sex:</label>
    <select name="sex">
        <option value="0">Male</option>
        <option value="1">Female</option>
    </select>

    <label>Age:</label>
    <input type="number" step="any" name="age" required>

    <label>Fare:</label>
    <input type="number" step="any" name="fare" required>

    <button type="submit">Predict</button>
</form>

</div></body>
</html>
